name: grc-gate
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changes & Set Working Dir
        id: context
        run: |
          mkdir -p $GITHUB_WORKSPACE/evidence

          CHANGED_TF=$(git diff --name-only origin/main...HEAD | grep '\.tf$' | head -n 1 || true)

          if [ -z "$CHANGED_TF" ]; then
            CHANGED_DIR="terraform"
          else
            CHANGED_DIR=$(dirname "$CHANGED_TF")
          fi

          if [ ! -d "$CHANGED_DIR" ]; then
            echo "ERROR: Resolved TF_WORKING_DIR '$CHANGED_DIR' does not exist in repo"
            exit 1
          fi

          echo "TF_WORKING_DIR=$CHANGED_DIR" >> $GITHUB_ENV
          echo "Target Directory: $CHANGED_DIR"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Install tfsec
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: Conftest policy gate
        run: |
          # 1. Verify files exist before running (Debug)
          ls -R ${{ github.workspace }}/policies
          ls ${{ github.workspace }}/terraform/plan.json

          # 2. Run Conftest using absolute paths for both policy and data
          # We run from the root, targeting the plan inside the terraform folder
          conftest test ${{ github.workspace }}/terraform/plan.json \
            --policy ${{ github.workspace }}/policies \
            --all-namespaces \
            --output json > ${{ github.workspace }}/evidence/conftest-results.json || true

          # 3. Enhanced Python Parser
          python3 -c "
          import json, sys, os
          path = '${{ github.workspace }}/evidence/conftest-results.json'
          
          if not os.path.exists(path) or os.stat(path).st_size == 0:
              print('FAIL: Conftest failed to produce a results file'); sys.exit(1)
          
          with open(path) as f:
              data = json.load(f)
          
          # Conftest JSON is a list of file-result objects
          results = data if isinstance(data, list) else [data]
          
          total_violations = 0
          for file_result in results:
              # Check for standard 'failures'
              total_violations += len(file_result.get('failures', []) or [])
              # Check for 'errors' (syntax errors in your Rego)
              if file_result.get('errors'):
                  print(f'Rego Errors Found: {file_result["errors"]}')
                  total_violations += len(file_result['errors'])

          print(f'Total Policy Violations Found: {total_violations}')
          sys.exit(0 if total_violations == 0 else 1)
          "

      - name: tfsec scan
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tfsec . \
            --config-file $GITHUB_WORKSPACE/.tfsec/config.yml \
            --minimum-severity HIGH \
            --format sarif \
            --out $GITHUB_WORKSPACE/evidence/tfsec.sarif || true

          python3 -c "
          import json, sys
          d = json.load(open('$GITHUB_WORKSPACE/evidence/tfsec.sarif'))
          high = sum(len(run.get('results', [])) for run in d.get('runs', []))
          print(f'tfsec high+critical: {high}')
          sys.exit(0 if high == 0 else 1)
          "

      - name: Copy plan into evidence
        if: always()
        run: |
          cp ${{ env.TF_WORKING_DIR }}/plan.json $GITHUB_WORKSPACE/evidence/plan.json
          cp ${{ env.TF_WORKING_DIR }}/plan.txt  $GITHUB_WORKSPACE/evidence/plan.txt

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 90

      - name: Bundle + sign + upload to vault
        id: sign
        if: always()
        env:
          VAULT: ${{ vars.EVIDENCE_VAULT }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUNDLE="evidence-${RUN_ID}-${SHA}.tar.gz"
          ( cd $GITHUB_WORKSPACE/evidence && tar czf "../${BUNDLE}" . )
          shasum -a 256 "${BUNDLE}" | awk '{print $1}' > "${BUNDLE}.sha256"

          cosign sign-blob --yes --bundle "${BUNDLE}.sig.bundle" "${BUNDLE}"

          KEY_PREFIX="runs/${RUN_ID}"
          aws s3 cp "${BUNDLE}"            "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}"
          aws s3 cp "${BUNDLE}.sha256"     "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sha256"
          aws s3 cp "${BUNDLE}.sig.bundle" "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sig.bundle"

          VERSION_ID=$(aws s3api head-object \
            --bucket "${VAULT}" \
            --key "${KEY_PREFIX}/${BUNDLE}" \
            --query VersionId \
            --output text)

          SHA256=$(cat "${BUNDLE}.sha256")
          cat > receipt.json <<EOF
          {
            "run_id":"${RUN_ID}",
            "vault":"${VAULT}",
            "bundle_key":"${KEY_PREFIX}/${BUNDLE}",
            "version_id":"${VERSION_ID}",
            "sha256":"${SHA256}",
            "commit":"${SHA}"
          }
          EOF
          aws s3 cp receipt.json "s3://${VAULT}/${KEY_PREFIX}/receipt.json"